[paths]
yf_data_path = yfdatas
data_path = datas
output_path = outputs

[market]
risk_free_rate      = 0.05  # Assumed risk-free rate for option pricing (5% annualized)

[spx]
wing_width          = 50    # Width of each option spread wing
min_long_strike     = 5     # strike - wing_width must be >= this value (prevents naked short strikes)
num_contracts       = 1     # Number of contracts per side (1 contract = 100 shares)
target_dte          = 30    # Target days to expiration at entry
put_delta           = 18    # Short put target delta (positive number, share-equivalent units)
call_delta          = 14    # Short call target delta (positive number, share-equivalent units)
vix_no_trade        = 25    # Skip new entries above this VIX level
entry_weekday       = MONDAY # ALL, MONDAY, TUESDAY, ... (return value of current_date.strftime("%A").upper())
vix_exit_put        = 30    # Exit put side if VIX exceeds this level (even if profit target not hit)
profit_target       = 0.50  # Target profit as a fraction of max potential credit (e.g. 0.5 = 50% of max credit)
stop_loss_multiplier = 2    # Per leg Stop loss as a multiple of max potential credit (e.g. 2 = 200% of max credit)
exit_dte            = 10    # Smart exit any remaining positions at EXIT_DTE days to expiration (regardless of profit/loss)

# Net-delta roll thresholds (share-equivalent units, per 1 contract spread)
net_delta_warn      = 10   # Monitor band for absolute net delta (positive number, share-equivalent units)
net_delta_roll      = 15   # Roll threshold for absolute net delta (|net delta| > 15 -> roll the threatened side)
max_rolls_per_side  = 3  # safety cap per side to prevent runaway rolling

# constants for the stock put spread strategy.
# All scanner + trade sizing values live here so nothing is hardcoded
# in strategy or scanner code.

# ── scanner thresholds ────────────────────────────────────────────────────
[stocks]
debug_trade_id              = -1     # debug 1st N trades, -1 to disable (prints all trades)
debug_tickers               = []     # debug specific tickers, empty list to disable (e.g. ["AAPL", "MSFT"])
earnings_lookahead_days     = 1      # entry on day N after earnings, 1 = day immediately after
ema_period                  = 20     # EMA(20)
ema_trend_days              = 5      # EMA today > EMA 5 days ago
rsi_period                  = 14     # RSI(14)
rsi_slope_days              = 3      # slope over last 3 days
rsi_slope_min               = 0.5    # minimum slope to qualify
support_lookback            = 20     # rolling N-day low for support
min_price_above_support_pct = 0.02   # price must be >= 2% above support
strike_increment            = 5.0    # nearest $5 strike below support
entry_weekday               = ALL    # ALL, MONDAY, TUESDAY, ... (return value of current_date.strftime("%A").upper())
vix_no_trade                = -1     # <0 disables VIX filter

# ── trade sizing ──────────────────────────────────────────────────────────
target_dte      = 60     # ~2 months to expiration
wing_width      = 10     # $10 wide put spread
min_long_strike = 5      # strike - wing_width must be >= this value (prevents naked short strikes)
profit_target   = 0.15   # close at 15% of credit (mid of 10-25% range)
num_contracts   = 1      # contracts per trade
stop_loss_mult  = 2.0    # 2x credit stop loss (matches SPX convention)
vol_scalar      = 0.80   # scale historical volatility to get more realistic option prices for stocks